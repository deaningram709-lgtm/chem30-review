<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chemistry 30 Diploma Review Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --green-dark: #1B4332;
  --green-mid: #2D6A4F;
  --green-light: #40916C;
  --green-pale: #D8F3DC;
  --amber: #E9C46A;
  --amber-dark: #C9A227;
  --teal: #48CAE4;
  --coral: #F4845F;
  --bg: #FAF8F3;
  --card: #FFFFFF;
  --text: #1C1C2E;
  --text-mid: #4A4A6A;
  --text-light: #7A7A9A;
  --border: #E8E4DC;
  --shadow: 0 2px 16px rgba(27,67,50,0.08);
  --shadow-lg: 0 8px 32px rgba(27,67,50,0.14);
  --radius: 12px;
  --radius-sm: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
}

/* ── NAV ─────────────────────────────────────────── */
nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--green-dark);
  box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  display: flex; align-items: center; gap: 0;
}

.nav-brand {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 24px;
  color: #fff;
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 0.3px;
  text-decoration: none;
  white-space: nowrap;
  border-right: 1px solid rgba(255,255,255,0.12);
}

.nav-brand span { font-size: 1.4rem; }

.nav-links { display: flex; align-items: stretch; flex: 1; }

.nav-item { position: relative; }

.nav-item > a, .nav-item > button {
  display: flex; align-items: center; gap: 5px;
  padding: 0 18px; height: 52px;
  color: rgba(255,255,255,0.88);
  font-size: 0.82rem; font-weight: 500; letter-spacing: 0.4px;
  text-decoration: none; background: none; border: none;
  cursor: pointer; white-space: nowrap;
  transition: background 0.15s, color 0.15s;
}

.nav-item > a:hover, .nav-item > button:hover,
.nav-item.active > button { background: rgba(255,255,255,0.1); color: #fff; }

.nav-item > button::after { content: '▾'; font-size: 0.7rem; margin-left: 2px; }

.dropdown {
  display: none; position: absolute; top: 100%; left: 0;
  background: #fff; border-radius: var(--radius-sm);
  box-shadow: var(--shadow-lg);
  min-width: 240px; padding: 8px 0; z-index: 200;
  border: 1px solid var(--border);
}

.nav-item:hover .dropdown, .nav-item:focus-within .dropdown { display: block; }

.dropdown a {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 18px;
  color: var(--text); font-size: 0.82rem; font-weight: 500;
  text-decoration: none;
  transition: background 0.12s;
}

.dropdown a:hover { background: var(--green-pale); color: var(--green-dark); }

.dropdown-section {
  padding: 6px 18px 2px;
  font-size: 0.68rem; font-weight: 700; letter-spacing: 1px;
  color: var(--text-light); text-transform: uppercase;
  border-top: 1px solid var(--border); margin-top: 4px;
}

.dropdown-section:first-child { border-top: none; margin-top: 0; }

.nav-cta {
  margin-left: auto;
  padding: 0 20px;
  display: flex; align-items: center;
}

.nav-cta a {
  background: var(--amber); color: var(--green-dark);
  padding: 8px 18px; border-radius: 20px;
  font-size: 0.8rem; font-weight: 700;
  text-decoration: none;
  transition: background 0.15s, transform 0.1s;
}

.nav-cta a:hover { background: var(--amber-dark); transform: translateY(-1px); }

/* ── HERO ─────────────────────────────────────────── */
#home {
  background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 60%, #1a5c6e 100%);
  color: #fff; padding: 64px 40px 48px;
  position: relative; overflow: hidden;
}

#home::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

.hero-inner { position: relative; max-width: 1100px; margin: 0 auto; }

.hero-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(233,196,106,0.2); border: 1px solid rgba(233,196,106,0.4);
  color: var(--amber); padding: 5px 14px; border-radius: 20px;
  font-size: 0.75rem; font-weight: 600; letter-spacing: 0.5px;
  text-transform: uppercase; margin-bottom: 18px;
}

.hero-inner h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 4vw, 3rem);
  font-weight: 700; line-height: 1.15;
  margin-bottom: 14px;
}

.hero-inner h1 em { font-style: normal; color: var(--amber); }

.hero-inner p {
  font-size: 1.05rem; color: rgba(255,255,255,0.82);
  max-width: 600px; margin-bottom: 32px;
}

.hero-stats {
  display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 32px;
}

.stat-card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(8px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-sm);
  padding: 14px 22px; text-align: center;
}

.stat-card .num {
  font-size: 1.7rem; font-weight: 700; color: var(--amber);
  line-height: 1;
}

.stat-card .lbl {
  font-size: 0.72rem; color: rgba(255,255,255,0.7);
  text-transform: uppercase; letter-spacing: 0.6px; margin-top: 4px;
}

.hero-units {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 12px;
}

.unit-chip {
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
  border-radius: var(--radius-sm); padding: 14px 16px;
  cursor: pointer; text-decoration: none; color: #fff;
  transition: background 0.2s, transform 0.15s, border-color 0.2s;
  display: flex; align-items: center; gap: 10px;
}

.unit-chip:hover {
  background: rgba(255,255,255,0.15);
  border-color: rgba(255,255,255,0.3);
  transform: translateY(-2px);
}

.unit-chip .chip-icon { font-size: 1.4rem; }

.unit-chip .chip-text { font-size: 0.82rem; }
.unit-chip .chip-text strong { display: block; font-weight: 600; margin-bottom: 1px; }
.unit-chip .chip-text span { color: rgba(255,255,255,0.6); font-size: 0.75rem; }

/* ── EXAM COUNTDOWN ───────────────────────────────── */
.countdown-bar {
  background: var(--amber); color: var(--green-dark);
  padding: 10px 40px; text-align: center;
  font-size: 0.85rem; font-weight: 600;
  display: flex; align-items: center; justify-content: center; gap: 12px;
}

.countdown-bar input[type="date"] {
  border: none; background: rgba(0,0,0,0.1);
  border-radius: 6px; padding: 3px 8px;
  font-size: 0.82rem; font-weight: 600;
  color: var(--green-dark); cursor: pointer;
}

#countdown-display { font-size: 1rem; font-weight: 700; }
/* ── STUDY SCHEDULE PANEL ─────────────────────────── */
#schedule-panel {
  display: none;
  background: #fffbeb;
  border-top: 2px solid rgba(180,130,0,0.18);
  padding: 14px 40px 18px;
  animation: schedSlide 0.3s ease;
}
@keyframes schedSlide {
  from { opacity:0; transform:translateY(-6px); }
  to   { opacity:1; transform:translateY(0); }
}
#schedule-panel.visible { display: block; }
.schedule-title {
  text-align: center;
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--green-dark);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 12px;
  opacity: 0.7;
}
.schedule-grid {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
}
.sched-card {
  background: white;
  border-radius: 10px;
  padding: 10px 14px;
  min-width: 128px;
  max-width: 190px;
  flex: 1 1 128px;
  border-top: 3px solid var(--sc-color,#4caf50);
  box-shadow: 0 1px 5px rgba(0,0,0,0.08);
}
.sched-card .sc-icon { font-size: 1.1rem; line-height:1; }
.sched-card .sc-name { font-weight:700; font-size:0.8rem; color:#1a1a2e; margin:4px 0 1px; }
.sched-card .sc-sub  { font-size:0.67rem; color:#888; margin-bottom:4px; }
.sched-card .sc-dates{ font-size:0.7rem; font-weight:700; color:var(--sc-color,#4caf50); }
.sched-card .sc-tip  { font-size:0.66rem; color:#999; margin-top:4px; line-height:1.4; }
.sched-card a.sc-jump{
  display:inline-block; margin-top:7px;
  font-size:0.67rem; color:var(--sc-color,#4caf50);
  text-decoration:none; font-weight:700;
}
.sched-card a.sc-jump:hover { text-decoration:underline; }


/* ── SECTION LAYOUT ───────────────────────────────── */
.section { padding: 56px 40px; max-width: 1100px; margin: 0 auto; }

.section-header {
  display: flex; align-items: flex-end; gap: 20px;
  margin-bottom: 32px; padding-bottom: 20px;
  border-bottom: 2px solid var(--border);
}

.unit-tag {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 20px;
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.5px;
  text-transform: uppercase;
}

.tag-a { background: #DCFCE7; color: #166534; }
.tag-b { background: #FEF9C3; color: #854D0E; }
.tag-c { background: #E0F2FE; color: #075985; }
.tag-d { background: #FAE8FF; color: #6B21A8; }
.tag-diploma { background: #FFE4E6; color: #9F1239; }

.section-header .header-text h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.75rem; font-weight: 700; color: var(--green-dark);
  margin-bottom: 4px;
}

.section-header .header-text p {
  color: var(--text-mid); font-size: 0.88rem;
}

.weight-badge {
  margin-left: auto; padding: 10px 18px;
  background: var(--green-pale); border-radius: var(--radius-sm);
  text-align: center; white-space: nowrap;
}

.weight-badge .pct { font-size: 1.4rem; font-weight: 700; color: var(--green-dark); line-height: 1; }
.weight-badge .lbl { font-size: 0.68rem; color: var(--text-mid); letter-spacing: 0.5px; }

/* ── TABS ─────────────────────────────────────────── */
.tabs { display: flex; gap: 4px; margin-bottom: 28px; flex-wrap: wrap; }

.tab-btn {
  padding: 9px 20px; border-radius: 20px;
  border: 1.5px solid var(--border); background: var(--card);
  font-size: 0.8rem; font-weight: 600; color: var(--text-mid);
  cursor: pointer; transition: all 0.15s;
}

.tab-btn:hover { border-color: var(--green-light); color: var(--green-dark); }
.tab-btn.active { background: var(--green-dark); color: #fff; border-color: var(--green-dark); }

.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── CARDS GRID ───────────────────────────────────── */
.cards-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
}

.card {
  background: var(--card); border-radius: var(--radius);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  overflow: hidden; transition: box-shadow 0.15s, transform 0.15s;
}

.card:hover { box-shadow: var(--shadow-lg); transform: translateY(-2px); }

.card-header {
  padding: 14px 18px 10px;
  display: flex; align-items: center; gap: 10px;
}

.card-icon { font-size: 1.3rem; }

.card-header h3 { font-size: 0.88rem; font-weight: 700; color: var(--green-dark); }
.card-header p { font-size: 0.75rem; color: var(--text-mid); }

.card-links { padding: 0 14px 14px; list-style: none; }

.card-links li { margin-bottom: 4px; }

.card-links a {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 10px; border-radius: var(--radius-sm);
  color: var(--text); font-size: 0.8rem;
  text-decoration: none;
  transition: background 0.12s, color 0.12s;
}

.card-links a:hover { background: var(--green-pale); color: var(--green-dark); }

.card-links a .link-icon { font-size: 1rem; flex-shrink: 0; }

.card-links a .ext-badge {
  margin-left: auto; font-size: 0.65rem; font-weight: 600;
  background: #E0F2FE; color: #075985;
  padding: 2px 7px; border-radius: 10px;
}

.card-links a .pdf-badge {
  margin-left: auto; font-size: 0.65rem; font-weight: 600;
  background: #FFE4E6; color: #9F1239;
  padding: 2px 7px; border-radius: 10px;
}

/* ── OUTCOMES ACCORDION ───────────────────────────── */
.outcomes-list { display: flex; flex-direction: column; gap: 8px; }

.outcome-item {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); overflow: hidden;
}

.outcome-toggle {
  width: 100%; display: flex; align-items: center; gap: 12px;
  padding: 13px 18px; cursor: pointer;
  background: none; border: none; text-align: left;
  font-size: 0.85rem; font-weight: 600; color: var(--text);
  transition: background 0.12s;
}

.outcome-toggle:hover { background: var(--green-pale); }

.outcome-toggle .ot-code {
  font-size: 0.72rem; color: var(--green-light); font-weight: 700;
  background: var(--green-pale); padding: 2px 8px; border-radius: 10px;
  white-space: nowrap;
}

.outcome-toggle .ot-check {
  margin-left: auto; width: 20px; height: 20px;
  border: 2px solid var(--border); border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
}

.outcome-toggle .ot-check.checked { background: var(--green-light); border-color: var(--green-light); }
.outcome-toggle .ot-check.checked::after { content: '✓'; color: #fff; font-size: 0.75rem; font-weight: 700; }

.outcome-toggle .ot-arrow { color: var(--text-light); margin-right: 4px; transition: transform 0.2s; }
.outcome-item.open .ot-arrow { transform: rotate(90deg); }

.outcome-body {
  display: none; padding: 14px 18px 16px;
  border-top: 1px solid var(--border);
  background: #FAFAF8;
}

.outcome-item.open .outcome-body { display: block; }

.outcome-body p { font-size: 0.83rem; color: var(--text-mid); margin-bottom: 10px; }
.outcome-body ul { list-style: disc; padding-left: 18px; }
.outcome-body ul li { font-size: 0.82rem; color: var(--text-mid); margin-bottom: 5px; }
.outcome-body strong { color: var(--text); }

/* ── KEY CONCEPT BOXES ────────────────────────────── */
.concept-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

.concept-box {
  background: var(--card); border-radius: var(--radius-sm);
  border: 1.5px solid var(--border); padding: 18px;
}

.concept-box h4 {
  font-size: 0.88rem; font-weight: 700; color: var(--green-dark);
  margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
}

.concept-box ul { list-style: none; }
.concept-box ul li {
  font-size: 0.8rem; color: var(--text-mid); padding: 4px 0;
  border-bottom: 1px solid var(--border); display: flex; gap: 6px;
}
.concept-box ul li:last-child { border-bottom: none; }
.concept-box ul li::before { content: '→'; color: var(--green-light); flex-shrink: 0; }

/* ── STUDY TIPS ───────────────────────────────────── */
.tips-bar {
  background: linear-gradient(135deg, #FFF8E7, #FFF3CD);
  border: 1.5px solid var(--amber);
  border-radius: var(--radius); padding: 18px 22px; margin-bottom: 24px;
  display: flex; gap: 14px; align-items: flex-start;
}

.tips-bar .tip-icon { font-size: 1.4rem; flex-shrink: 0; margin-top: 2px; }
.tips-bar h4 { font-size: 0.85rem; font-weight: 700; color: var(--amber-dark); margin-bottom: 5px; }
.tips-bar p { font-size: 0.8rem; color: #6b5900; line-height: 1.5; }

/* ── ONLINE RESOURCES ─────────────────────────────── */
.resource-platform {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 16px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); margin-bottom: 8px;
  text-decoration: none; color: var(--text);
  transition: border-color 0.15s, box-shadow 0.15s;
}

.resource-platform:hover { border-color: var(--teal); box-shadow: 0 2px 10px rgba(72,202,228,0.15); }

.rp-logo { font-size: 1.3rem; width: 36px; text-align: center; }
.rp-text { flex: 1; }
.rp-text strong { display: block; font-size: 0.83rem; font-weight: 700; margin-bottom: 2px; }
.rp-text span { font-size: 0.75rem; color: var(--text-mid); }
.rp-arrow { color: var(--text-light); font-size: 0.9rem; }

/* ── DIPLOMA SECTION ──────────────────────────────── */
#diploma { background: linear-gradient(180deg, #fff 0%, var(--green-pale) 100%); }

.diploma-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 14px; margin-bottom: 28px;
}

.diploma-card {
  background: var(--card); border-radius: var(--radius);
  border: 1.5px solid var(--border); padding: 20px;
  display: flex; flex-direction: column; gap: 10px;
}

.diploma-card h3 { font-size: 0.88rem; font-weight: 700; color: var(--green-dark); }
.diploma-card p { font-size: 0.78rem; color: var(--text-mid); flex: 1; }

.diploma-card a {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 14px; border-radius: var(--radius-sm);
  font-size: 0.8rem; font-weight: 600;
  text-decoration: none; transition: background 0.15s;
}

.btn-primary { background: var(--green-dark); color: #fff; }
.btn-primary:hover { background: var(--green-mid); }
.btn-secondary { background: var(--green-pale); color: var(--green-dark); }
.btn-secondary:hover { background: #B7E4C7; }

/* ── PROGRESS BAR ─────────────────────────────────── */
.progress-section {
  background: var(--card); border-radius: var(--radius);
  border: 1.5px solid var(--border); padding: 22px;
  margin-bottom: 32px;
}

.progress-section h3 { font-size: 0.9rem; font-weight: 700; color: var(--green-dark); margin-bottom: 14px; }

.progress-bars { display: flex; flex-direction: column; gap: 10px; }

.prog-row { display: flex; align-items: center; gap: 12px; }
.prog-label { font-size: 0.78rem; font-weight: 600; color: var(--text-mid); width: 140px; flex-shrink: 0; }
.prog-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; }
.prog-pct { font-size: 0.72rem; font-weight: 700; color: var(--text-mid); width: 34px; text-align: right; }

/* ── SEARCH ───────────────────────────────────────── */
.search-bar {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 24px; padding: 10px 18px; margin-bottom: 24px;
}

.search-bar input {
  flex: 1; border: none; outline: none; background: none;
  font-size: 0.88rem; color: var(--text);
}

.search-bar span { color: var(--text-light); }

/* ── FOOTER ───────────────────────────────────────── */
footer {
  background: var(--green-dark); color: rgba(255,255,255,0.7);
  padding: 28px 40px; text-align: center;
  font-size: 0.78rem; line-height: 1.8;
}

footer strong { color: var(--amber); }

/* ── UTILS ────────────────────────────────────────── */
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } }

.divider { height: 1px; background: var(--border); margin: 28px 0; }

.intro-box {
  background: var(--green-pale); border-radius: var(--radius);
  padding: 20px 24px; margin-bottom: 24px;
  border-left: 4px solid var(--green-light);
}

.intro-box p { font-size: 0.85rem; color: var(--green-dark); line-height: 1.6; }
.intro-box p + p { margin-top: 8px; }

.section-wrap { border-top: 3px solid var(--border); padding-top: 8px; margin-top: 0; }

</head>
<body>

<!-- NAV -->
<nav>
  <a href="#home" class="nav-brand"><span>⚗️</span> Chem 30 Review Hub</a>
  <div class="nav-links">
    <div class="nav-item">
      <button>Unit A — Thermochemical</button>
      <div class="dropdown">
        <a href="#unit-a" onclick="openTab('a','outcomes')">📋 Learning Outcomes</a>
        <a href="#unit-a" onclick="openTab('a','concepts')">🔥 Key Concepts</a>
        <a href="#unit-a" onclick="openTab('a','resources')">📄 Notes &amp; Resources</a>
        <a href="#unit-a" onclick="openTab('a','online')">🌐 Online Study Tools</a>
      </div>
    </div>
    <div class="nav-item">
      <button>Unit B — Electrochemical</button>

    <div id="tab-a-outcomes" class="tab-content active">
      <div class="intro-box"><p><strong>Theme: Energy Transformations.</strong> Unit A explores how energy is stored, transferred, and transformed during chemical reactions. Master the calculation types — calorimetry, Hess's Law, bond energies, and ΔG — as these appear frequently on the diploma.</p></div>
      <div class="outcomes-list"><div class="outcome-item" data-id="a1">
  <button class="outcome-toggle" onclick="toggleOutcome('a1')">
    <span class="ot-arrow">▶</span><span class="ot-code">A1</span> Explain the concept of enthalpy and classify reactions as exothermic or endothermic
    <span class="ot-check" onclick="checkOutcome(event,'a1')"></span>
  </button>
  <div class="outcome-body"><ul><li>Distinguish between exothermic (ΔH < 0, releases heat) and endothermic (ΔH > 0, absorbs heat) reactions</li><li>Explain how enthalpy change (ΔH) relates to energy stored in chemical bonds</li><li>Draw and interpret potential energy diagrams labeling reactants, products, ΔH, and Ea</li><li>Identify the sign of ΔH from a reaction profile</li></ul></div>
</div><div class="outcome-item" data-id="a2">
  <button class="outcome-toggle" onclick="toggleOutcome('a2')">
    <span class="ot-arrow">▶</span><span class="ot-code">A2</span> Apply calorimetry to calculate heat transfer in chemical and physical processes
    <span class="ot-check" onclick="checkOutcome(event,'a2')"></span>
  </button>
  <div class="outcome-body"><ul><li>Use q = mcΔT to calculate heat gained or lost by water and solution calorimeters</li><li>Apply q = nΔH to relate molar enthalpy to measurable heat</li><li>Account for heat of solution, neutralization, and combustion in calorimetry problems</li><li>Identify sources of error in calorimetry experiments</li></ul></div>
</div><div class="outcome-item" data-id="a3">
  <button class="outcome-toggle" onclick="toggleOutcome('a3')">
    <span class="ot-arrow">▶</span><span class="ot-code">A3</span> Apply Hess's Law to calculate enthalpy changes for reactions
    <span class="ot-check" onclick="checkOutcome(event,'a3')"></span>
  </button>
  <div class="outcome-body"><ul><li>State Hess's Law: ΔH is path-independent and depends only on initial and final states</li><li>Combine two or more thermochemical equations (multiplying, reversing, adding) to find a target ΔH</li><li>Use standard enthalpies of formation (ΔH°f) with the formula ΔH°rxn = ΣΔH°f(products) − ΣΔH°f(reactants)</li><li>Solve multi-step Hess's Law problems with correct sign conventions</li></ul></div>
</div><div class="outcome-item" data-id="a4">
  <button class="outcome-toggle" onclick="toggleOutcome('a4')">
    <span class="ot-arrow">▶</span><span class="ot-code">A4</span> Estimate enthalpy change using bond energies
    <span class="ot-check" onclick="checkOutcome(event,'a4')"></span>
  </button>
  <div class="outcome-body"><ul><li>Use average bond energies: ΔH ≈ Σ(bonds broken) − Σ(bonds formed)</li><li>Recognize that bond breaking is endothermic and bond forming is exothermic</li><li>Calculate ΔH estimates from structural formulas using bond energy tables</li><li>Compare bond energy estimates to experimental values and explain discrepancies</li></ul></div>
</div><div class="outcome-item" data-id="a5">
  <button class="outcome-toggle" onclick="toggleOutcome('a5')">
    <span class="ot-arrow">▶</span><span class="ot-code">A5</span> Explain activation energy, catalysis, and reaction energy diagrams
    <span class="ot-check" onclick="checkOutcome(event,'a5')"></span>
  </button>
  <div class="outcome-body"><ul><li>Define activation energy (Ea) and explain its role in reaction rate</li><li>Describe how catalysts lower Ea without changing ΔH</li><li>Compare catalyzed vs. uncatalyzed reaction profiles on energy diagrams</li><li>Identify the activated complex (transition state) on a potential energy diagram</li></ul></div>
</div><div class="outcome-item" data-id="a6">
  <button class="outcome-toggle" onclick="toggleOutcome('a6')">
    <span class="ot-arrow">▶</span><span class="ot-code">A6</span> Apply entropy and Gibbs free energy to predict reaction spontaneity
    <span class="ot-check" onclick="checkOutcome(event,'a6')"></span>
  </button>
  <div class="outcome-body"><ul><li>Define entropy (S) as a measure of disorder; predict whether ΔS is positive or negative for a reaction</li><li>Apply ΔG = ΔH − TΔS to determine spontaneity (ΔG < 0 = spontaneous)</li><li>Predict when a reaction is spontaneous based on signs of ΔH and ΔS</li><li>Explain how temperature affects spontaneity when ΔH and ΔS have the same sign</li></ul></div>
</div></div>
    </div>
    <div id="tab-a-concepts" class="tab-content">
      <div class="concept-grid"><div class="concept-box"><h4>🔥 Enthalpy & Reaction Types</h4><ul><li>Exothermic: ΔH < 0 (releases heat to surroundings)</li><li>Endothermic: ΔH > 0 (absorbs heat from surroundings)</li><li>Standard enthalpy of formation: ΔH°f for 1 mol from elements in standard states</li><li>Enthalpy is a state function — path does not matter</li></ul></div><div class="concept-box"><h4>🧪 Calorimetry Equations</h4><ul><li>q = mcΔT (heat = mass × specific heat × temperature change)</li><li>c(water) = 4.18 J/(g·°C)</li><li>q = nΔH (heat = moles × molar enthalpy)</li><li>Calorimeter: heat lost by reaction = heat gained by water</li></ul></div><div class="concept-box"><h4>➕ Hess's Law</h4><ul><li>ΔH°rxn = ΣΔH°f(products) − ΣΔH°f(reactants)</li><li>Reverse a reaction → reverse the sign of ΔH</li><li>Multiply a reaction → multiply ΔH by same factor</li><li>Add equations → add ΔH values</li></ul></div><div class="concept-box"><h4>🔗 Bond Energies</h4><ul><li>ΔH ≈ Σ(bonds broken) − Σ(bonds formed)</li><li>Breaking bonds: always endothermic (+)</li><li>Forming bonds: always exothermic (−)</li><li>Bond energy method gives estimates only</li></ul></div><div class="concept-box"><h4>⚡ Activation Energy & Catalysts</h4><ul><li>Ea = energy barrier reactants must overcome</li><li>Catalyst lowers Ea; does not change ΔH</li><li>Activated complex = highest-energy transition state</li><li>Enzymes are biological catalysts</li></ul></div><div class="concept-box"><h4>⚖️ Gibbs Free Energy</h4><ul><li>ΔG = ΔH − TΔS</li><li>ΔG < 0: spontaneous; ΔG > 0: non-spontaneous; ΔG = 0: equilibrium</li><li>ΔS > 0: more disorder (gases formed, solids dissolved)</li><li>Temperature determines spontaneity when ΔH and ΔS have same sign</li></ul></div></div>
    </div>

      <div class="intro-box"><p><strong>Theme: Electron Transfer.</strong> Unit B is built around electrons moving between substances. The key is always identifying what's oxidized (loses e⁻) and what's reduced (gains e⁻), then applying that to cells and calculations.</p></div>
      <div class="outcomes-list"><div class="outcome-item" data-id="b1">
  <button class="outcome-toggle" onclick="toggleOutcome('b1')">
    <span class="ot-arrow">▶</span><span class="ot-code">B1</span> Assign oxidation numbers and identify oxidation and reduction in redox reactions
    <span class="ot-check" onclick="checkOutcome(event,'b1')"></span>
  </button>
  <div class="outcome-body"><ul><li>Assign oxidation numbers using the rules (free element = 0, H = +1, O = −2, etc.)</li><li>Identify which species is oxidized (loses electrons, ox. no. increases) and which is reduced (gains electrons)</li><li>Define oxidizing agent (gets reduced) and reducing agent (gets oxidized)</li><li>Write and balance half-reactions for oxidation and reduction</li></ul></div>
</div><div class="outcome-item" data-id="b2">
  <button class="outcome-toggle" onclick="toggleOutcome('b2')">
    <span class="ot-arrow">▶</span><span class="ot-code">B2</span> Balance redox equations using the half-reaction method
    <span class="ot-check" onclick="checkOutcome(event,'b2')"></span>
  </button>
  <div class="outcome-body"><ul><li>Split into oxidation and reduction half-reactions</li><li>Balance atoms (mass balance: H₂O for O, H⁺ for H in acidic; OH⁻ and H₂O in basic)</li><li>Balance charge by adding electrons, then equalize electron count before combining</li><li>Apply to both acidic and basic solution conditions</li></ul></div>
</div><div class="outcome-item" data-id="b3">
  <button class="outcome-toggle" onclick="toggleOutcome('b3')">
    <span class="ot-arrow">▶</span><span class="ot-code">B3</span> Predict redox reaction spontaneity using the activity series and standard reduction potentials
    <span class="ot-check" onclick="checkOutcome(event,'b3')"></span>
  </button>
  <div class="outcome-body"><ul><li>Use the activity series to predict whether a metal will displace another from solution</li><li>Use the standard reduction potential table: reactions are spontaneous when E°cell > 0</li><li>Calculate E°cell = E°cathode − E°anode</li><li>Identify stronger/weaker oxidizing and reducing agents from the table</li></ul></div>
</div><div class="outcome-item" data-id="b4">
  <button class="outcome-toggle" onclick="toggleOutcome('b4')">
    <span class="ot-arrow">▶</span><span class="ot-code">B4</span> Explain the operation of voltaic (galvanic) and electrolytic cells
    <span class="ot-check" onclick="checkOutcome(event,'b4')"></span>
  </button>
  <div class="outcome-body"><ul><li>Describe voltaic cell components: anode (oxidation, −), cathode (reduction, +), salt bridge, external circuit</li><li>Distinguish voltaic cells (spontaneous, generates electricity) from electrolytic cells (non-spontaneous, requires electricity)</li><li>Write cell notation: anode | anode soln || cathode soln | cathode</li><li>Identify electrode reactions, ion flow direction, and electron flow in both cell types</li></ul></div>
</div><div class="outcome-item" data-id="b5">
  <button class="outcome-toggle" onclick="toggleOutcome('b5')">
    <span class="ot-arrow">▶</span><span class="ot-code">B5</span> Apply Faraday's Law to electrochemical stoichiometry calculations
    <span class="ot-check" onclick="checkOutcome(event,'b5')"></span>
  </button>
  <div class="outcome-body"><ul><li>Know Faraday's constant: F = 96 485 C/mol e⁻</li><li>Relate charge (Q = It) to moles of electrons: n(e⁻) = Q/F</li><li>Convert moles of electrons to moles and mass of substance deposited or consumed</li><li>Solve multi-step electrolysis problems involving current, time, and mass</li></ul></div>
</div><div class="outcome-item" data-id="b6">
  <button class="outcome-toggle" onclick="toggleOutcome('b6')">
    <span class="ot-arrow">▶</span><span class="ot-code">B6</span> Perform and interpret redox titrations
    <span class="ot-check" onclick="checkOutcome(event,'b6')"></span>
  </button>
  <div class="outcome-body"><ul><li>Identify redox titrations as quantitative analysis based on electron transfer</li><li>Calculate moles of analyte from titrant volume, concentration, and mole ratio from half-reactions</li><li>Identify common titrants (KMnO₄, K₂Cr₂O₇) and their colour changes as indicators</li><li>Apply stoichiometry to determine concentration or purity from titration data</li></ul></div>
</div></div>

    <div id="tab-b-concepts" class="tab-content">
      <div class="concept-grid"><div class="concept-box"><h4>⚡ Oxidation Numbers & OIL RIG</h4><ul><li>OIL RIG: Oxidation Is Loss (of e⁻), Reduction Is Gain (of e⁻)</li><li>Oxidation: ox. no. increases; Reduction: ox. no. decreases</li><li>Oxidizing agent: gains e⁻, gets reduced</li><li>Reducing agent: loses e⁻, gets oxidized</li></ul></div><div class="concept-box"><h4>⚖️ Balancing Redox: Half-Reaction Method</h4><ul><li>Step 1: Separate into half-reactions</li><li>Step 2: Balance atoms & charge</li><li>Step 3: Multiply to equalize e⁻</li><li>Step 4: Add half-reactions, cancel e⁻</li></ul></div><div class="concept-box"><h4>🔋 Standard Cell Potential</h4><ul><li>E°cell = E°cathode − E°anode</li><li>Spontaneous if E°cell > 0</li><li>Larger positive E°: stronger oxidizing agent (top of SRP table)</li><li>Anode: where oxidation occurs (−); Cathode: reduction (+)</li></ul></div><div class="concept-box"><h4>🏭 Electrolytic Cells</h4><ul><li>Non-spontaneous; requires external power supply</li><li>Anode connected to + terminal of battery</li><li>Cathode connected to − terminal</li><li>Applications: electroplating, electrolysis of water, aluminum smelting</li></ul></div><div class="concept-box"><h4>⚗️ Faraday's Law</h4><ul><li>Q = It (charge = current × time)</li><li>n(e⁻) = Q ÷ 96 485</li><li>Mass = n(e⁻) × (molar mass ÷ electrons in half-reaction)</li><li>Units: Q in coulombs, I in amperes, t in seconds</li></ul></div><div class="concept-box"><h4>🧫 Redox Titrations</h4><ul><li>MnO₄⁻ (purple) → Mn²⁺ (colourless) in acidic solution</li><li>Use mole ratio from balanced net ionic equation</li><li>n = cV; match e⁻ transferred in each half-reaction</li><li>Common applications: Fe²⁺/Fe³⁺, H₂O₂, and organic acid analysis</li></ul></div></div>
    </div>

      <div class="concept-grid"><div class="concept-box"><h4>⛓️ IUPAC Naming Rules</h4><ul><li>1. Find longest carbon chain (parent name)</li><li>2. Number chain from end closest to first branch</li><li>3. Name branches as substituents (alphabetical order)</li><li>4. Suffix: alkane (−ane), alkene (−ene), alkyne (−yne)</li></ul></div><div class="concept-box"><h4>🔗 Key Functional Groups</h4><ul><li>Alcohol (−OH): suffix −ol</li><li>Aldehyde (−CHO): suffix −al</li><li>Ketone (C=O): suffix −one</li><li>Carboxylic acid (−COOH): suffix −oic acid</li><li>Ester (−COO−): suffix −oate</li><li>Amine (−NH₂): suffix −amine</li></ul></div><div class="concept-box"><h4>🌊 Intermolecular Forces</h4><ul><li>H-bonding (O−H, N−H, F−H): strongest IMF</li><li>Dipole-dipole: polar molecules</li><li>London dispersion: all molecules; larger = stronger</li><li>Higher IMF → higher BP; "like dissolves like"</li></ul></div><div class="concept-box"><h4>⚗️ Organic Reaction Types</h4><ul><li>Addition: adds across double bond (alkene → alkane derivative)</li><li>Substitution: replaces H on alkane</li><li>Elimination: removes atoms to form double bond</li><li>Esterification: acid + alcohol → ester + water</li><li>Saponification: ester + NaOH → salt + alcohol</li><li>Combustion: organic + O₂ → CO₂ + H₂O</li></ul></div><div class="concept-box"><h4>🧵 Polymers</h4><ul><li>Addition polymerization: monomers join without losing atoms (polyethylene)</li><li>Condensation polymerization: monomers join with loss of small molecule (nylon, polyester)</li><li>Identify monomer from repeat unit and vice versa</li><li>Thermoplastics vs. thermosetting plastics</li></ul></div></div>

    <div id="tab-d-outcomes" class="tab-content active">
      <div class="intro-box"><p><strong>Theme: Balance &amp; Reversibility.</strong> Unit D is heavily calculation-based. pH problems, Ksp, buffer calculations, and titrations all appear as written response questions. Understand the underlying equilibrium logic, not just the formulas.</p></div>
      <div class="outcomes-list"><div class="outcome-item" data-id="d1">
  <button class="outcome-toggle" onclick="toggleOutcome('d1')">
    <span class="ot-arrow">▶</span><span class="ot-code">D1</span> Explain the concept of dynamic chemical equilibrium
    <span class="ot-check" onclick="checkOutcome(event,'d1')"></span>
  </button>
  <div class="outcome-body"><ul><li>Define dynamic equilibrium: forward and reverse rates are equal; concentrations are constant but not zero</li><li>State the conditions required for equilibrium: closed system, constant temperature</li><li>Write equilibrium law expressions (Keq) from balanced equations; exclude pure solids and liquids</li><li>Interpret large Keq (favours products) vs. small Keq (favours reactants)</li></ul></div>
</div><div class="outcome-item" data-id="d2">
  <button class="outcome-toggle" onclick="toggleOutcome('d2')">
    <span class="ot-arrow">▶</span><span class="ot-code">D2</span> Apply Le Châtelier's Principle to predict equilibrium shifts
    <span class="ot-check" onclick="checkOutcome(event,'d2')"></span>
  </button>
  <div class="outcome-body"><ul><li>State Le Châtelier's Principle: a system at equilibrium responds to stress by shifting to minimize the disturbance</li><li>Predict shifts when concentration, pressure (for gases), or temperature changes</li><li>Explain why adding an inert gas or changing volume at constant pressure affects (or doesn't affect) equilibrium</li><li>Apply to industrial processes (Haber process for ammonia, Contact process for sulfuric acid)</li></ul></div>
</div><div class="outcome-item" data-id="d3">
  <button class="outcome-toggle" onclick="toggleOutcome('d3')">
    <span class="ot-arrow">▶</span><span class="ot-code">D3</span> Apply Brønsted-Lowry acid-base theory and identify conjugate pairs
    <span class="ot-check" onclick="checkOutcome(event,'d3')"></span>
  </button>
  <div class="outcome-body"><ul><li>Define Brønsted-Lowry acids (proton donors) and bases (proton acceptors)</li><li>Identify conjugate acid-base pairs in any proton transfer reaction</li><li>Identify amphiprotic species (can act as both acid and base, e.g., HCO₃⁻, H₂O)</li><li>Predict the direction of acid-base equilibrium using relative acid/base strengths</li></ul></div>
</div><div class="outcome-item" data-id="d4">
  <button class="outcome-toggle" onclick="toggleOutcome('d4')">
    <span class="ot-arrow">▶</span><span class="ot-code">D4</span> Perform pH, pOH, Ka, Kb, and Kw calculations
    <span class="ot-check" onclick="checkOutcome(event,'d4')"></span>
  </button>
  <div class="outcome-body"><ul><li>Calculate pH = −log[H₃O⁺] and pOH = −log[OH⁻]; relate via pH + pOH = 14 (at 25°C)</li><li>Use Kw = [H⁺][OH⁻] = 1.0 × 10⁻¹⁴ to find [H⁺] or [OH⁻]</li><li>Calculate Ka or Kb from equilibrium concentrations; use ICE tables for weak acid/base equilibria</li><li>Relate Ka and Kb for a conjugate pair: Ka × Kb = Kw</li></ul></div>
</div><div class="outcome-item" data-id="d5">
  <button class="outcome-toggle" onclick="toggleOutcome('d5')">
    <span class="ot-arrow">▶</span><span class="ot-code">D5</span> Explain buffer systems and apply buffer calculations
    <span class="ot-check" onclick="checkOutcome(event,'d5')"></span>
  </button>

    <div id="tab-d-concepts" class="tab-content">
      <div class="concept-grid"><div class="concept-box"><h4>⚖️ Dynamic Equilibrium</h4><ul><li>Rate(forward) = Rate(reverse) at equilibrium</li><li>Keq >> 1: equilibrium favours products</li><li>Keq << 1: equilibrium favours reactants</li><li>Keq = [products]^coeff / [reactants]^coeff (omit solids/liquids)</li></ul></div><div class="concept-box"><h4>🔄 Le Châtelier's Principle</h4><ul><li>Add reactant/remove product → shift right</li><li>Add product/remove reactant → shift left</li><li>Increase pressure (gas) → shift toward fewer moles of gas</li><li>Increase temperature → shift endothermic direction</li></ul></div><div class="concept-box"><h4>🧪 Acid-Base Theory</h4><ul><li>Brønsted-Lowry acid: proton (H⁺) donor</li><li>Brønsted-Lowry base: proton acceptor</li><li>Conjugate pairs differ by one H⁺</li><li>Amphiprotic: can donate or accept H⁺ (e.g., HCO₃⁻)</li></ul></div><div class="concept-box"><h4>🔢 pH & Ka/Kb Calculations</h4><ul><li>pH = −log[H₃O⁺]; pOH = −log[OH⁻]; pH + pOH = 14</li><li>Ka × Kb = Kw = 1.0 × 10⁻¹⁴ (25°C)</li><li>ICE table: Initial, Change, Equilibrium concentrations</li><li>Strong acids/bases: fully dissociate (no Ka/Kb needed)</li></ul></div><div class="concept-box"><h4>💊 Buffers</h4><ul><li>Weak acid + conjugate base (or weak base + conjugate acid)</li><li>pH = pKa + log([A⁻]/[HA]) — Henderson-Hasselbalch</li><li>Buffer capacity: largest when [A⁻] = [HA] (pH = pKa)</li><li>Blood buffer: H₂CO₃ ⇌ H⁺ + HCO₃⁻ maintains pH ≈ 7.4</li></ul></div><div class="concept-box"><h4>📊 Titration Curves</h4><ul><li>Equivalence point: stoichiometric moles of acid = moles of base</li><li>SA/SB: equivalence at pH 7; WA/SB: equivalence > 7; WB/SA: equivalence < 7</li><li>Choose indicator whose pKa ≈ equivalence point pH</li><li>Half-equivalence point: pH = pKa for weak acid titration</li></ul></div></div>

<script>
// ── Tab switching ─────────────────────────────────────
function openTab(unit, tab) {
  // Deactivate all tabs in this unit
  const allContents = document.querySelectorAll('[id^="tab-' + unit + '-"]');
  allContents.forEach(el => el.classList.remove('active'));
  const allBtns = document.querySelectorAll('#tabs-' + unit + ' .tab-btn');
  allBtns.forEach(btn => btn.classList.remove('active'));

  // Activate selected tab
  const target = document.getElementById('tab-' + unit + '-' + tab);
  if (target) target.classList.add('active');

  // Activate the button that matches
  allBtns.forEach(btn => {
    if (btn.textContent.toLowerCase().includes(tab === 'outcomes' ? 'outcome' :
        tab === 'concepts' ? 'concept' :
        tab === 'resources' ? 'resource' : 'online')) {
      btn.classList.add('active');
    }
  });
  // Scroll to section
  const section = document.getElementById('unit-' + unit);
  if (section) setTimeout(() => section.scrollIntoView({behavior:'smooth', block:'start'}), 50);
}

// ── Outcome accordion ─────────────────────────────────
function toggleOutcome(id) {
  const item = document.querySelector('[data-id="' + id + '"]');
  if (!item) return;
  item.classList.toggle('open');
}

// ── Outcome checkboxes ────────────────────────────────
function checkOutcome(event, id) {
  event.stopPropagation();
  const check = event.currentTarget;
  check.classList.toggle('checked');
  // Save to localStorage
  const saved = JSON.parse(localStorage.getItem('chem30progress') || '{}');
  saved[id] = check.classList.contains('checked');
  localStorage.setItem('chem30progress', JSON.stringify(saved));
  updateProgress();
}

// ── Restore progress from localStorage ───────────────
function restoreProgress() {
  const saved = JSON.parse(localStorage.getItem('chem30progress') || '{}');
  Object.entries(saved).forEach(([id, checked]) => {
    const item = document.querySelector('[data-id="' + id + '"]');
    if (item && checked) {
      const check = item.querySelector('.ot-check');
      if (check) check.classList.add('checked');
    }
  });
  updateProgress();
}

// ── Progress bars ─────────────────────────────────────
function updateProgress() {
  const groups = [
    { ids: ['a1','a2','a3','a4','a5','a6'], bar: 'prog-a', pct: 'pct-a' },
    { ids: ['b1','b2','b3','b4','b5','b6'], bar: 'prog-b', pct: 'pct-b' },
    { ids: ['c1','c2','c3','c4','c5'],      bar: 'prog-c', pct: 'pct-c' },
    { ids: ['d1','d2','d3','d4','d5','d6'], bar: 'prog-d', pct: 'pct-d' },
  ];
  groups.forEach(g => {
    const total = g.ids.length;
    const done = g.ids.filter(id => {
      const el = document.querySelector('[data-id="' + id + '"] .ot-check');
      return el && el.classList.contains('checked');
    }).length;
    const pct = Math.round((done / total) * 100);
    const bar = document.getElementById(g.bar);
    const pctEl = document.getElementById(g.pct);
    if (bar) bar.style.width = pct + '%';
    if (pctEl) pctEl.textContent = pct + '%';
  });
}

// ── Countdown timer ───────────────────────────────────
function updateCountdown() {
  const dateInput = document.getElementById('exam-date');
  const display = document.getElementById('countdown-display');
  if (!dateInput.value) { display.textContent = '← Set your exam date!'; generateSchedule(-1); return; }
  const examDate = new Date(dateInput.value + 'T08:00:00');
  const now = new Date();
  const diff = examDate - now;
  if (diff < 0) { display.textContent = 'Good luck — you\'ve got this! 🌟'; generateSchedule(0); return; }
  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  if (days === 0) display.textContent = `Exam is TODAY! ${hours}h remaining 🎯`;
  else if (days === 1) display.textContent = `1 day to go — final review time! 💪`;
  else display.textContent = `${days} days until your diploma exam`;
  generateSchedule(days);
  // Save date
  localStorage.setItem('chem30examdate', dateInput.value);
}

// ── Study schedule generator ──────────────────────────
function generateSchedule(days) {
  const panel = document.getElementById('schedule-panel');
  if (!panel) return;
  if (days < 0) { panel.classList.remove('visible'); return; }

  const today = new Date(); today.setHours(0,0,0,0);
  const addD = (d,n) => { const r=new Date(d); r.setDate(r.getDate()+n); return r; };
  const fmt  = d => d.toLocaleDateString('en-CA',{month:'short',day:'numeric'});
  const dateRange = (start,n) => n<=1 ? fmt(start) : `${fmt(start)} – ${fmt(addD(start,n-1))}`;

  const UNITS = [
    { icon:'🔥', name:'Unit A', sub:'Thermochemical Changes', anchor:'#unit-a', color:'#f44336', w:25,
      tips: ['Master calorimetry, Hess’s Law, bond energies, and Gibbs free energy. Calculation questions are common on the diploma.',
             'Focus on calorimetry calculations, Hess’s Law, and ΔG = ΔH − TΔS.',
             'Calorimetry formula + one Hess’s Law practice problem.',
             'Quick: enthalpy signs, exo vs. endo, reaction profiles.'] },
    { icon:'⚡', name:'Unit B', sub:'Electrochemical Changes', anchor:'#unit-b', color:'#2196f3', w:25,
      tips: ['Oxidation numbers, balancing redox half-reactions, activity series, galvanic vs. electrolytic cells, and Faraday’s Law calculations.',
             'Prioritize: balancing redox equations, cell notation, and Faraday’s Law.',
             'Assign oxidation numbers + balance one redox reaction.',
             'Quick: OIL RIG, activity series, cell diagram labels.'] },
    { icon:'🧪', name:'Unit C', sub:'Organic Compounds', anchor:'#unit-c', color:'#9c27b0', w:25,
      tips: ['IUPAC naming (including cyclic, aromatic, and functional groups), reaction types, and biomolecules.',
             'Focus on IUPAC naming, functional group identification, and reaction type recognition.',
             'Name 5 organic compounds. Identify functional groups.',
             'Quick: functional groups list + one naming practice.'] },
    { icon:'⚖️', name:'Unit D', sub:'Chemical Equilibrium', anchor:'#unit-d', color:'#ff9800', w:25,
      tips: ['Le Châtelier’s principle, acid-base theories, pH/pOH/Ka/Kb/Kw calculations, buffers, titrations, and Ksp. Heavy calculation unit!',
             'Prioritize: pH/Ka/Kb calculations, titration curves, and Ksp.',
             'pH calculation + one Ksp problem.',
             'Quick: Ka/Kb formulas, strong vs weak acids, Le Châtelier’s stress responses.'] },
  ];

  const DIPLOMA = { icon:'🎓', name:'Diploma Prep', sub:'Practice & Strategy', anchor:'#diploma', color:'#e91e63',
    tips: ['Full practice exams under timed conditions. The data booklet is available — practice using it efficiently.',
           'Complete 2 full practice exams. Check every calculation with the marking guide.',
           'Use the outcomes checklist to find weak spots, then target practice questions.',
           'Data booklet practice + diploma-style written response questions.'] };

  const card = (icon,name,sub,anchor,color,dateStr,tip) =>
    `<div class="sched-card" style="--sc-color:${color};border-top-color:${color}">
      <div class="sc-icon">${icon}</div>
      <div class="sc-name">${name}</div>
      <div class="sc-sub">${sub}</div>
      <div class="sc-dates">${dateStr}</div>
      <div class="sc-tip">${tip}</div>
      <a href="${anchor}" class="sc-jump">Go →</a>
    </div>`;

  let title, cards = '', cursor = new Date(today);

  if (days === 0) {
    title = '🌟 Exam Day — You’ve prepared hard. Go show what you know!';
    cards = `<div style="text-align:center;font-size:0.82rem;color:var(--green-dark);font-weight:600;padding:4px 0;">
      Breathe. Bring your data booklet. Show all your work on calculations. You’ve got this. 💪</div>`;
  } else if (days >= 28) {
    title = '📚 Comprehensive Review Plan';
    const studyD = Math.floor(days * 0.80);
    const prepD  = days - studyD;
    for (let i=0;i<UNITS.length;i++) {
      const u=UNITS[i], d=Math.max(1,Math.round(studyD*u.w/100));
      cards += card(u.icon,u.name,u.sub,u.anchor,u.color,dateRange(cursor,d),u.tips[0]);
      cursor=addD(cursor,d);
    }
    cards += card(DIPLOMA.icon,DIPLOMA.name,DIPLOMA.sub,DIPLOMA.anchor,DIPLOMA.color,dateRange(cursor,prepD),DIPLOMA.tips[0]);
  } else if (days >= 14) {
    title = '🎯 Focused Review Plan';
    const studyD = Math.floor(days * 0.78);
    const prepD  = Math.max(2, days - studyD);
    for (let i=0;i<UNITS.length;i++) {
      const u=UNITS[i], d=Math.max(1,Math.round(studyD*u.w/100));
      cards += card(u.icon,u.name,u.sub,u.anchor,u.color,dateRange(cursor,d),u.tips[1]);
      cursor=addD(cursor,d);
    }
    cards += card(DIPLOMA.icon,DIPLOMA.name,DIPLOMA.sub,DIPLOMA.anchor,DIPLOMA.color,dateRange(cursor,prepD),DIPLOMA.tips[1]);
  } else if (days >= 5) {
    title = '⚡ Rapid Review Mode';
    const contentD = Math.ceil(days * 0.62);
    const prepD    = Math.max(1, days - contentD);
    for (let i=0;i<UNITS.length;i++) {
      const u=UNITS[i], d=Math.max(1,Math.round(contentD*u.w/100));
      cards += card(u.icon,u.name,u.sub,u.anchor,u.color,dateRange(cursor,d),u.tips[2]);
      cursor=addD(cursor,d);
    }
    cards += card(DIPLOMA.icon,DIPLOMA.name,DIPLOMA.sub,DIPLOMA.anchor,DIPLOMA.color,dateRange(cursor,prepD),DIPLOMA.tips[2]);
  } else {
    title = '🔥 Exam Crunch Mode';
    const phases = [
      {icon:'✅',name:'Outcomes Sweep',sub:'All units',anchor:'#unit-a',color:'#4caf50',d:1,tip:'Go through every unit’s outcomes checklist. Flag anything you’re unsure of.'},
      {icon:'📝',name:'Targeted Practice',sub:'Diploma-style Qs',anchor:'#diploma',color:'#e91e63',d:Math.max(1,days-2),tip:'Calculation practice: Hess’s Law, redox, pH, and Ksp. Use the data booklet.'},
      {icon:'💤',name:'Rest Well',sub:'Night before exam',anchor:'#diploma',color:'#607d8b',d:1,tip:'Stop studying by 9 pm. Sleep 8+ hours. Your brain consolidates memory while you sleep.'},
    ];
    for (const p of phases) {
      cards += card(p.icon,p.name,p.sub,p.anchor,p.color,dateRange(cursor,p.d),p.tip);
      cursor=addD(cursor,p.d);
    }
  }

  panel.innerHTML = `<div class="schedule-title">${title}</div><div class="schedule-grid">${cards}</div>`;
  panel.classList.add('visible');
}


// ── Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  restoreProgress();
  // Restore saved exam date
  const savedDate = localStorage.getItem('chem30examdate');
  const dateInput = document.getElementById('exam-date');
  if (savedDate && dateInput) {
    dateInput.value = savedDate;
    updateCountdown();
  }
  // Update countdown every minute
  setInterval(updateCountdown, 60000);
});

// Smooth scroll for anchor links
document.querySelectorAll('a[href^="#"]').forEach(a => {
  a.addEventListener('click', e => {
    const target = document.querySelector(a.getAttribute('href'));
    if (target) { e.preventDefault(); target.scrollIntoView({behavior:'smooth'}); }
  });
});
</script>
